<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f1117" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#F5F7FA" media="(prefers-color-scheme: light)">
<title>O2 Flow</title>
<style>
:root{
  --bg-color:#F5F7FA;--card-bg:#FFFFFF;--text-main:#131313;--text-muted:#5c6a7c;--text-sub:#323232;
  --accent-blue:#3474F0;--halo-breathing:#3474F0;--halo-hold:#5e6b7c;--ring-size:140px;
  --surface-2:#F4F6FA;--border-color:#E6E6E6;--border-subtle:#f0f0f0;
  --hover-subtle:#f4f6f9;--hover-blue:#EEF3FE;--hover-blue-strong:#DDE8FD;
  --input-bg:#FAFAFA;--input-focus-bg:#FFFFFF;--btn-secondary-bg:#EAEAEA;
  --bar-track:#F0F2F5;--history-item-bg:#FAFAFA;--picker-opt:#FAFAFA;--picker-opt-border:#EEEEEE;
  --modal-overlay-bg:rgba(245,247,250,0.85);--picker-blur-bg:rgba(245,247,250,0.7);
  --intro-left-bg:#f4f6f9;--card-img-bg:#eef1f6;--hamburger-hover:#f0f0f0;--finger-fill:#EAEAEA;
  --btn-sm-bg:#E6E6E6;--btn-sm-hover:#D8D8D8;
  --btn-red-bg:#FFEBEE;--btn-red-text:#C62828;
  --btn-extend-bg:#FFFFFF;--btn-extend-border:#EEEEEE;
  --toggle-track:#DDDFE6;--toggle-thumb:#FFFFFF;
  --remove-hover-bg:#FFEBEE;
}
body.dark{
  --bg-color:#0f1117;--card-bg:#1a1d27;--text-main:#e8eaf0;--text-muted:#8997b1;--text-sub:#9aa3bc;
  --accent-blue:#4d8aff;--halo-breathing:#4d8aff;--halo-hold:#7b8fa8;
  --surface-2:#1f2235;--border-color:#252836;--border-subtle:#1e2030;
  --hover-subtle:#22263a;--hover-blue:#1a2340;--hover-blue-strong:#1e2d55;
  --input-bg:#12141e;--input-focus-bg:#1a1d27;--btn-secondary-bg:#252836;
  --bar-track:#1f2235;--history-item-bg:#161926;--picker-opt:#161926;--picker-opt-border:#252836;
  --modal-overlay-bg:rgba(10,12,18,0.92);--picker-blur-bg:rgba(10,12,18,0.72);
  --intro-left-bg:#12141e;--card-img-bg:#1a1d27;--hamburger-hover:#22263a;--finger-fill:#252836;
  --btn-sm-bg:#252836;--btn-sm-hover:#2e3348;
  --btn-red-bg:#2a1215;--btn-red-text:#ef5350;
  --btn-extend-bg:#1a1d27;--btn-extend-border:#252836;
  --toggle-track:#252836;--toggle-thumb:#e8eaf0;
  --remove-hover-bg:#2a1215;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg-color);color:var(--text-main);min-height:100vh;min-height:100dvh;overflow:hidden;position:relative;transition:background 0.35s ease,color 0.35s ease;overscroll-behavior:none;-webkit-text-size-adjust:100%;}

.hamburger-btn{position:fixed;top:max(18px,env(safe-area-inset-top));left:max(18px,env(safe-area-inset-left));z-index:200;width:44px;height:44px;background:var(--card-bg);border:none;border-radius:10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;box-shadow:0 2px 12px rgba(0,0,0,0.08);transition:background 0.2s;touch-action:manipulation;}
.hamburger-btn:hover{background:var(--hamburger-hover);}
.hamburger-btn span{display:block;width:18px;height:2px;background:var(--text-sub);border-radius:2px;transition:all 0.3s;}
.hamburger-btn.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}
.hamburger-btn.open span:nth-child(2){opacity:0;}
.hamburger-btn.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}

.drawer{position:fixed;top:0;left:0;height:100%;width:220px;background:var(--card-bg);z-index:190;box-shadow:4px 0 24px rgba(0,0,0,0.07);transform:translateX(-100%);transition:transform 0.35s cubic-bezier(0.2,0.8,0.2,1);display:flex;flex-direction:column;padding-top:calc(72px + env(safe-area-inset-top));padding-left:env(safe-area-inset-left);}
.drawer.open{transform:translateX(0);}
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.18);z-index:180;opacity:0;pointer-events:none;transition:opacity 0.3s;}
.drawer-overlay.open{opacity:1;pointer-events:auto;}
.drawer-nav{display:flex;flex-direction:column;gap:4px;padding:0 12px;}
.drawer-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:10px;cursor:pointer;font-size:0.9rem;font-weight:600;color:var(--text-muted);transition:background 0.15s,color 0.15s;border:none;background:none;text-align:left;width:100%;min-height:44px;touch-action:manipulation;}
.drawer-item:hover{background:var(--hover-subtle);color:var(--text-main);}
.drawer-item.active{background:var(--hover-blue);color:var(--accent-blue);}
.drawer-icon{width:18px;height:18px;flex-shrink:0;}

.visualizer-layer{position:fixed;left:0;width:100%;display:flex;align-items:center;justify-content:center;z-index:5;pointer-events:none;transition:transform 0.8s cubic-bezier(0.2,0.8,0.2,1),top 0.8s cubic-bezier(0.2,0.8,0.2,1);}
.visualizer-layer.mode-menu{top:20%;transform:translateY(-50%) scale(0.85);}
.visualizer-layer.mode-session{top:50%;transform:translateY(-50%) scale(1);}
.halo-wrapper{position:relative;width:var(--ring-size);height:var(--ring-size);display:flex;align-items:center;justify-content:center;}
.halo-ring{width:100%;height:100%;border-radius:50%;background:transparent;border:20px solid var(--accent-blue);position:absolute;z-index:1;transition:all 0.5s ease-out,opacity 0.5s ease;will-change:transform,border-color,border-width;box-shadow:0 10px 40px rgba(52,116,240,0.25);opacity:1;}
.visualizer-layer.mode-menu .halo-ring{opacity:1!important;box-shadow:0 15px 45px rgba(52,116,240,0.15);border-width:25px;}
.visualizer-layer.mode-menu .hud-main{font-size:16rem;font-weight:800;letter-spacing:-2px;transform:translateX(110px) translateY(20px);}
.visualizer-layer.mode-menu .hud-sub{font-size:1.6rem;letter-spacing:5px;font-weight:700;margin-top:60px;margin-left:20px;}
@media(max-width:480px){
  :root{--ring-size:115px;}
  .visualizer-layer.mode-menu .hud-main{font-size:10rem;transform:translateX(70px) translateY(12px);}
  .visualizer-layer.mode-menu .hud-sub{font-size:1.3rem;letter-spacing:4px;margin-top:44px;}
  .visualizer-layer.mode-menu .halo-ring{border-width:18px;}
  .visualizer-layer.mode-menu{top:18%;}
  .menu-wrapper,.session-view,.stats-view{height:68vh;}
  .menu-grid{gap:12px;}
  .menu-card-img{height:90px;}
  .menu-card-content{padding:14px;}
  .menu-card h3{font-size:1rem;}
  .intro-left img{height:150px;}
  .intro-right{padding:20px;}
  .intro-desc{font-size:0.9rem;margin-bottom:18px;}
  .settings-layout{padding:20px 18px;}
  .modal-card{border-radius:18px;max-width:96%;max-height:88dvh;overflow-y:auto;}
  .stat-cards-row{gap:8px;}
  .stat-card{padding:12px 8px;}
  .stat-card-val{font-size:1.4rem;}
  .stepper-ctrl button{width:36px;height:36px;}
  .slot-rounds-btn{width:34px;height:34px;}
  .controls{gap:8px;}
  .btn-sm{padding:11px 16px;font-size:0.8rem;}
  .session-start-bar{margin-top:8px;}
  .btn-session-start{padding:14px;}
  .top-label{font-size:0.95rem;letter-spacing:2px;}
  .hud-main{font-size:1.6rem;}
}
.box-path{position:absolute;width:150px;height:150px;border:4px solid var(--border-color);border-radius:8px;z-index:1;opacity:0;pointer-events:none;transition:opacity 0.5s ease;}
.box-path.active{opacity:1;}
.box-dot{position:absolute;width:18px;height:18px;background:var(--accent-blue);border-radius:50%;transform:translate(-50%,-50%);left:0%;top:100%;box-shadow:0 0 12px var(--accent-blue);z-index:2;}
.nadi-graphic{position:absolute;top:15px;width:55px;height:65px;z-index:10;opacity:0;transition:opacity 0.5s ease;}
.nadi-graphic.visible{opacity:1;}
.nose-line{fill:none;stroke:var(--text-muted);stroke-width:3;stroke-linecap:round;stroke-linejoin:round;}
.finger{fill:var(--finger-fill);transition:fill 0.3s ease,transform 0.3s cubic-bezier(0.2,0.8,0.2,1);}
.nadi-graphic.block-left #fingerLeft{fill:var(--accent-blue);transform:translateX(6px);}
.nadi-graphic.block-right #fingerRight{fill:var(--accent-blue);transform:translateX(-6px);}

.menu-wrapper{position:fixed;bottom:0;width:100%;height:65vh;display:flex;flex-direction:column;align-items:center;z-index:10;transition:opacity 0.5s ease,transform 0.5s ease;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(40px + env(safe-area-inset-bottom));mask-image:linear-gradient(to top,black 90%,transparent 100%);-webkit-mask-image:linear-gradient(to top,black 90%,transparent 100%);}
.menu-wrapper.fade-out{opacity:0;transform:translateY(40px);pointer-events:none;}
.menu-title{text-align:center;font-size:0.85rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:20px;flex-shrink:0;}
.menu-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px;width:90%;max-width:900px;}
.menu-card{background:var(--card-bg);border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,0.04);cursor:pointer;transition:transform 0.2s cubic-bezier(0.2,0.8,0.2,1),box-shadow 0.2s;display:flex;flex-direction:column;overflow:hidden;}
.menu-card:hover{transform:translateY(-5px);box-shadow:0 15px 40px rgba(0,0,0,0.08);}
.menu-card.clicked{transform:scale(1.05);box-shadow:0 25px 60px rgba(52,116,240,0.2);z-index:15;}
.menu-card-img{width:100%;height:130px;object-fit:cover;background:var(--card-img-bg);}
.menu-card-content{padding:20px;flex:1;}
.menu-card h3{font-size:1.15rem;margin-bottom:8px;}
.menu-card p{font-size:0.85rem;color:var(--text-muted);line-height:1.4;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
@media(max-width:600px){.menu-grid{grid-template-columns:1fr;gap:15px;}.menu-card-img{height:110px;}.menu-card-content{padding:15px;}}

/* SESSION */
.session-view{position:fixed;bottom:0;width:100%;height:65vh;display:flex;flex-direction:column;align-items:center;z-index:10;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(40px + env(safe-area-inset-bottom));opacity:0;pointer-events:none;transition:opacity 0.4s ease,transform 0.4s ease;transform:translateY(30px);mask-image:linear-gradient(to top,black 90%,transparent 100%);-webkit-mask-image:linear-gradient(to top,black 90%,transparent 100%);}
.session-view.visible{opacity:1;pointer-events:auto;transform:translateY(0);}
.session-view.fade-out{opacity:0;pointer-events:none;transform:translateY(30px);}
.session-queue{display:flex;flex-direction:column;gap:12px;width:90%;max-width:600px;padding-top:8px;}
.queue-slot-header{display:flex;align-items:center;gap:10px;padding:12px 16px 12px 0;}
.slot-number{width:26px;height:26px;border-radius:50%;background:var(--hover-blue);color:var(--accent-blue);font-size:0.75rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.slot-info{flex:1;min-width:0;}
.slot-title{font-size:0.9rem;font-weight:600;color:var(--text-main);}

/* Inline round stepper on header */
.slot-rounds{display:flex;align-items:center;gap:0;background:var(--surface-2);border-radius:8px;overflow:hidden;flex-shrink:0;}
.slot-rounds-label{font-size:0.65rem;color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:0.5px;padding:0 6px;white-space:nowrap;}
.slot-rounds-btn{background:none;border:none;cursor:pointer;width:34px;height:34px;display:flex;align-items:center;justify-content:center;color:var(--accent-blue);font-size:1rem;font-weight:700;transition:background 0.15s;flex-shrink:0;touch-action:manipulation;}
.slot-rounds-btn:hover{background:var(--hover-blue-strong);}
.slot-rounds-val{font-size:0.85rem;font-weight:700;color:var(--text-main);min-width:22px;text-align:center;}

.slot-actions{display:flex;gap:6px;align-items:center;flex-shrink:0;}
.slot-btn{background:none;border:none;cursor:pointer;padding:5px;border-radius:7px;color:var(--text-muted);font-size:0.75rem;transition:background 0.15s,color 0.15s;}
.slot-btn:hover{background:var(--hover-subtle);color:var(--text-main);}
.slot-btn.remove{color:#e57373;}
.slot-btn.remove:hover{background:var(--remove-hover-bg);}

/* Expand for extra params */
.slot-expand{background:var(--history-item-bg);border-top:1px solid var(--border-subtle);padding:12px 16px;display:none;}
.slot-expand.open{display:block;}
.slot-expand-toggle{font-size:0.7rem;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;gap:4px;margin-bottom:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;border:none;background:none;padding:0;}
.slot-expand-toggle:hover{color:var(--accent-blue);}
.stepper-row{display:flex;flex-wrap:wrap;gap:10px;}
.stepper-item{display:flex;flex-direction:column;gap:5px;flex:1;min-width:90px;}
.stepper-item label{font-size:0.6rem;color:var(--text-muted);text-transform:uppercase;font-weight:700;letter-spacing:0.5px;}
.stepper-ctrl{display:flex;align-items:center;background:var(--input-bg);border:1px solid var(--border-color);border-radius:9px;overflow:hidden;}
.stepper-ctrl button{background:none;border:none;cursor:pointer;width:36px;height:36px;display:flex;align-items:center;justify-content:center;color:var(--accent-blue);font-size:1.1rem;font-weight:700;transition:background 0.15s;flex-shrink:0;touch-action:manipulation;}
.stepper-ctrl button:hover{background:var(--hover-blue);}
.stepper-val{flex:1;text-align:center;font-size:0.9rem;font-weight:700;color:var(--text-main);}

.add-slot-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;background:var(--card-bg);border:2px dashed var(--border-color);border-radius:16px;cursor:pointer;color:var(--text-muted);font-size:0.9rem;font-weight:600;transition:all 0.2s;}
.add-slot-btn:hover{border-color:var(--accent-blue);color:var(--accent-blue);background:var(--hover-blue);}
.slot-drag-handle{touch-action:none;cursor:grab;padding:0 6px 0 12px;color:var(--border-color);display:flex;align-items:center;flex-shrink:0;transition:color 0.15s;}
.slot-drag-handle:hover{color:var(--text-muted);}
.slot-drag-handle:active{cursor:grabbing;}
.queue-slot{background:var(--card-bg);border-radius:16px;box-shadow:0 6px 24px rgba(0,0,0,0.05);overflow:hidden;transition:opacity 0.15s,box-shadow 0.15s;}
.queue-slot.is-dragging{opacity:0.25;}
.queue-slot.drop-above{box-shadow:0 -3px 0 var(--accent-blue),0 6px 24px rgba(0,0,0,0.05);}
.queue-slot.drop-below{box-shadow:0 3px 0 var(--accent-blue),0 6px 24px rgba(0,0,0,0.05);}
#drag-ghost{border-radius:16px;overflow:hidden;box-shadow:0 20px 50px rgba(0,0,0,0.18);}
.technique-picker{position:fixed;inset:0;z-index:160;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s;}
.technique-picker.open{opacity:1;pointer-events:auto;}
.technique-picker-bg{position:absolute;inset:0;background:var(--picker-blur-bg);backdrop-filter:blur(4px);}
.technique-picker-sheet{position:relative;z-index:1;background:var(--card-bg);border-radius:24px 24px 0 0;width:100%;max-width:600px;padding:20px 20px 40px;box-shadow:0 -8px 40px rgba(0,0,0,0.1);transform:translateY(100%);transition:transform 0.4s cubic-bezier(0.2,0.8,0.2,1);}
.technique-picker.open .technique-picker-sheet{transform:translateY(0);}
.picker-title{font-size:0.8rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:16px;text-align:center;}
.picker-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.picker-option{padding:14px 16px;background:var(--picker-opt);border:1px solid var(--picker-opt-border);border-radius:12px;cursor:pointer;transition:all 0.15s;}
.picker-option:hover{background:var(--hover-blue);border-color:var(--accent-blue);}
.picker-option h4{font-size:0.9rem;font-weight:600;margin-bottom:3px;}
.picker-option p{font-size:0.75rem;color:var(--text-muted);}
.session-start-bar{display:flex;gap:10px;width:90%;max-width:600px;margin-top:4px;flex-shrink:0;}
.btn-session-start{flex:1;padding:16px;border-radius:14px;background:var(--accent-blue);color:#FFF;font-size:1rem;font-weight:600;border:none;cursor:pointer;box-shadow:0 8px 20px rgba(52,116,240,0.2);transition:transform 0.1s;min-height:52px;touch-action:manipulation;}
.btn-session-start:active{transform:scale(0.98);}
.btn-session-start:disabled{opacity:0.4;cursor:not-allowed;}

/* STATS */
.stats-view{position:fixed;bottom:0;width:100%;height:65vh;display:flex;flex-direction:column;align-items:center;z-index:10;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(40px + env(safe-area-inset-bottom));opacity:0;pointer-events:none;transition:opacity 0.4s ease,transform 0.4s ease;transform:translateY(30px);mask-image:linear-gradient(to top,black 92%,transparent 100%);-webkit-mask-image:linear-gradient(to top,black 92%,transparent 100%);}
.stats-view.visible{opacity:1;pointer-events:auto;transform:translateY(0);}
.stats-view.fade-out{opacity:0;pointer-events:none;transform:translateY(30px);}
.stats-inner{width:90%;max-width:700px;padding-top:8px;display:flex;flex-direction:column;gap:16px;}
.stat-cards-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.stat-card{background:var(--card-bg);border-radius:14px;padding:16px;box-shadow:0 4px 16px rgba(0,0,0,0.04);text-align:center;}
.stat-card-val{font-size:1.8rem;font-weight:800;color:var(--accent-blue);line-height:1.1;}
.stat-card-label{font-size:0.7rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-top:4px;font-weight:600;}
.stat-streak-fire{font-size:1.4rem;margin-bottom:2px;}
.chart-card{background:var(--card-bg);border-radius:16px;padding:20px;box-shadow:0 4px 16px rgba(0,0,0,0.04);}
.chart-card-title{font-size:0.75rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:16px;font-weight:700;}
.radar-wrap{display:flex;justify-content:center;}
.bar-list{display:flex;flex-direction:column;gap:10px;}
.bar-item{display:flex;align-items:center;gap:10px;}
.bar-label{font-size:0.8rem;font-weight:600;color:var(--text-sub);width:110px;flex-shrink:0;text-align:right;}
.bar-track{flex:1;background:var(--bar-track);border-radius:6px;height:10px;overflow:hidden;}
.bar-fill{height:100%;border-radius:6px;background:var(--accent-blue);transition:width 0.8s cubic-bezier(0.2,0.8,0.2,1);}
.bar-count{font-size:0.75rem;font-weight:700;color:var(--text-muted);width:28px;text-align:right;flex-shrink:0;}
.history-list{display:flex;flex-direction:column;gap:8px;}
.history-item{display:flex;align-items:center;gap:12px;background:var(--history-item-bg);border-radius:10px;padding:10px 14px;}
.history-dot{width:10px;height:10px;border-radius:50%;background:var(--accent-blue);flex-shrink:0;}
.history-name{font-size:0.85rem;font-weight:600;color:var(--text-main);flex:1;}
.history-meta{font-size:0.75rem;color:var(--text-muted);}
.empty-state{text-align:center;padding:40px 20px;color:var(--text-muted);font-size:0.9rem;line-height:1.6;}

/* MODALS */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:var(--modal-overlay-bg);backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity 0.5s ease;z-index:15;}
.modal-overlay.visible{opacity:1;pointer-events:auto;}
.modal-card{background:var(--card-bg);border-radius:24px;box-shadow:0 20px 60px rgba(0,0,0,0.08);position:absolute;top:50%;left:50%;transform:translate(-50%,40px) scale(0.95);opacity:0;pointer-events:none;z-index:20;transition:transform 0.5s cubic-bezier(0.2,0.8,0.2,1),opacity 0.4s ease;max-width:90%;width:100%;}
.modal-card.visible{transform:translate(-50%,-50%) scale(1);opacity:1;pointer-events:auto;}
.intro-layout{display:flex;max-width:750px;overflow:hidden;}
.intro-left{flex:1;background:var(--intro-left-bg);}
.intro-left img{width:100%;height:100%;object-fit:cover;display:block;}
.intro-right{flex:1.2;padding:40px;display:flex;flex-direction:column;justify-content:center;}
@media(max-width:700px){.intro-layout{flex-direction:column;}.intro-left img{height:200px;}.intro-right{padding:25px;}}
.settings-layout{max-width:400px;padding:30px;text-align:center;}
h2{font-size:0.8rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:15px;}
.intro-desc{font-size:0.95rem;color:var(--text-main);line-height:1.5;margin-bottom:25px;}
.input-row{display:flex;gap:12px;margin-bottom:12px;}
.input-group{flex:1;text-align:left;}
label{display:block;font-size:0.65rem;color:var(--text-muted);margin-bottom:5px;text-transform:uppercase;font-weight:700;}
input[type=number]{width:100%;padding:12px;background:var(--input-bg);border:1px solid var(--border-color);border-radius:12px;font-size:max(16px,1rem);font-weight:600;outline:none;text-align:center;transition:0.2s;color:var(--text-main);}
input[type=number]:focus{border-color:var(--accent-blue);background:var(--input-focus-bg);}
.button-row{display:flex;gap:10px;margin-top:10px;}
.btn-primary,.btn-secondary{flex:1;padding:16px;border-radius:14px;font-size:1rem;font-weight:600;cursor:pointer;transition:transform 0.1s;border:none;text-align:center;min-height:52px;touch-action:manipulation;}
.btn-primary{background:var(--accent-blue);color:white;box-shadow:0 8px 20px rgba(52,116,240,0.2);}
.btn-secondary{background:var(--btn-secondary-bg);color:var(--text-sub);}
.btn-primary:active,.btn-secondary:active{transform:scale(0.97);}
.btn-back{background:none;border:none;color:var(--text-muted);font-size:0.75rem;text-transform:uppercase;font-weight:700;margin-top:20px;cursor:pointer;letter-spacing:1px;align-self:flex-start;}
.btn-back:hover{color:var(--text-main);}
.btn-full{width:100%;margin-top:5px;}
.center-hud{position:absolute;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;width:100%;transition:transform 0.3s;}
.hud-main{font-size:1.8rem;font-weight:500;color:var(--accent-blue);line-height:1;white-space:nowrap;transition:color 0.3s,font-size 0.5s ease,font-weight 0.5s ease,transform 0.5s ease;}
.hud-main sub{font-size:0.6em;vertical-align:sub;margin-left:1px;}
.hud-sub{font-size:0.75rem;color:var(--text-muted);font-weight:600;margin-top:4px;text-transform:uppercase;transition:font-size 0.5s ease;}
.top-watermark{position:absolute;top:-125px;left:50%;transform:translateX(-50%);width:300px;text-align:center;font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:rgba(132,146,166,0.6);opacity:0;pointer-events:none;transition:opacity 0.3s ease;z-index:2;line-height:1;white-space:nowrap;}
.top-watermark.active{opacity:1;}
.top-label{position:absolute;top:-100px;left:50%;transform:translateX(-50%);width:300px;text-align:center;font-size:1.1rem;font-weight:700;text-transform:uppercase;letter-spacing:3px;color:var(--text-muted);opacity:0;transition:opacity 0.1s ease,color 0.3s ease;z-index:2;}
.top-label.active{opacity:1;}
.controls{position:fixed;bottom:max(40px,calc(20px + env(safe-area-inset-bottom)));left:50%;transform:translateX(-50%);display:flex;gap:12px;opacity:0;pointer-events:none;transition:opacity 0.5s;z-index:20;}
.controls.active{opacity:1;pointer-events:all;}
.btn-sm{padding:12px 22px;min-height:44px;border-radius:30px;border:none;background:var(--btn-sm-bg);color:var(--text-sub);cursor:pointer;font-weight:600;font-size:0.85rem;transition:background 0.15s;touch-action:manipulation;}
.btn-sm:hover{background:var(--btn-sm-hover);}
.btn-red{background:var(--btn-red-bg);color:var(--btn-red-text);}
.btn-extend{position:absolute;right:-50px;top:50%;transform:translateY(-50%);width:40px;height:40px;border-radius:50%;background:var(--btn-extend-bg);border:1px solid var(--btn-extend-border);color:var(--text-muted);font-size:0.75rem;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;pointer-events:none;transition:all 0.2s;box-shadow:0 4px 10px rgba(0,0,0,0.08);}
.btn-extend.visible{opacity:1;pointer-events:all;}
.btn-extend:hover{color:var(--accent-blue);border-color:var(--accent-blue);}
.seq-indicator{position:fixed;top:max(18px,env(safe-area-inset-top));right:max(18px,env(safe-area-inset-right));z-index:20;background:var(--card-bg);border-radius:10px;padding:8px 14px;font-size:0.75rem;font-weight:700;color:var(--text-muted);box-shadow:0 2px 12px rgba(0,0,0,0.08);opacity:0;transition:opacity 0.3s;pointer-events:none;}
.seq-indicator.active{opacity:1;}
.toggle-pill{width:32px;height:18px;border-radius:9px;background:var(--toggle-track);display:flex;align-items:center;padding:2px;transition:background 0.25s;flex-shrink:0;}
.toggle-pill.on{background:var(--accent-blue);}
.toggle-thumb{width:14px;height:14px;border-radius:50%;background:var(--toggle-thumb);transition:transform 0.25s;box-shadow:0 1px 4px rgba(0,0,0,0.2);}
.toggle-pill.on .toggle-thumb{transform:translateX(14px);}

@keyframes heartbeat{0%{transform:scale(0.85);}10%{transform:scale(0.87);}20%{transform:scale(0.85);}100%{transform:scale(0.85);}}
@keyframes recoveryHeartbeat{
  0%  {transform:scale(1.75);}
  12% {transform:scale(1.84);}
  24% {transform:scale(1.75);}
  100%{transform:scale(1.75);}
}
@keyframes kapalPump{
  0%  {transform:scale(1.0);border-width:20px;}
  35% {transform:scale(1.3);border-width:9px;}
  100%{transform:scale(1.0);border-width:20px;}
}
@keyframes bhastrikaRapid{
  0%  {transform:scale(1.0);border-width:20px;}
  50% {transform:scale(1.45);border-width:9px;}
  100%{transform:scale(1.0);border-width:20px;}
}
@keyframes restPulse{
  0%  {transform:scale(1.0);border-width:20px;}
  50% {transform:scale(1.06);border-width:19px;}
  100%{transform:scale(1.0);border-width:20px;}
}
@keyframes pulseHoldBig{0%{transform:scale(1.8);}10%{transform:scale(1.83);}20%{transform:scale(1.8);}100%{transform:scale(1.8);}}
@keyframes pulseHoldBox{0%{transform:scale(1);}10%{transform:scale(0.96);}20%{transform:scale(1);}100%{transform:scale(1);}}
#dynamicStyles{display:none;}
</style>
</head>

<script>
// ── DARK MODE ─────────────────────────────────────────────────────
(function(){
  // Default is dark; only switch to light if user explicitly saved '0'
  const dark=localStorage.getItem('o2_dark')!=='0';
  if(dark)document.body.classList.add('dark');
  function syncToggle(){
    const on=document.body.classList.contains('dark');
    const ind=document.getElementById('darkModeIndicator');
    if(ind)ind.classList.toggle('on',on);
  }
  window.toggleDarkMode=function(){
    document.body.classList.toggle('dark');
    localStorage.setItem('o2_dark',document.body.classList.contains('dark')?'1':'0');
    syncToggle();
  };
  document.addEventListener('DOMContentLoaded',syncToggle);
  setTimeout(syncToggle,0);
})();

// ── DATA ──────────────────────────────────────────────────────────
const intros={
  wimhof:{title:"Wim Hof",desc:"Rapid cyclical breathing saturates the blood with oxygen, followed by an extended breath retention that activates the sympathetic nervous system and builds CO₂ tolerance. Each round ends with a recovery inhale held briefly before release.",img:"Gemini_Generated_Image_czxzw5czxzw5czxz.png"},
  box:{title:"Box Breathing",desc:"Four equal phases — inhale, hold at top, exhale, hold at bottom — each timed identically. Widely used by athletes and military personnel to regulate the autonomic nervous system under pressure.",img:"Gemini_Generated_Image_.png"},
  belly:{title:"Diaphragmatic",desc:"Breathing that prioritises the lower lungs using the diaphragm rather than the chest. A longer exhale than inhale activates the parasympathetic nervous system, reducing cortisol and lowering heart rate.",img:"Gemini_Generated_Image_(2).png"},
  nadi:{title:"Alternate Nostril",desc:"A Hatha yoga technique that alternates airflow between nostrils. Each cycle inhales through one nostril and exhales through the other, promoting balance between the hemispheres and calming the mind.",img:"Gemini_Generated_Image_(1).png"},
  fiveseveneight:{title:"5-7-8 Breathing",desc:"A structured ratio technique: inhale for 5 counts, hold for 7, exhale for 8. The extended hold and long exhale strongly stimulate the vagus nerve, producing rapid relaxation and reducing anxiety.",img:"Gemini_Generated_Image_6drz746drz746drz.png"},
  horse:{title:"Horse Stance",desc:"Deep diaphragmatic breathing performed in or alongside a low, held stance from martial arts tradition. Sustained physical tension paired with controlled breath builds mental resilience and body awareness.",img:"Gemini_Generated_Image_8yrknp8yrknp8yrk.png"},
  meditation:{title:"Meditation",desc:"A silent, unguided timer to support seated meditation or open-awareness practice. Natural breathing throughout. A chime marks the close of the session.",img:"Gemini_Generated_Image_placeholder_meditation.png"},
  bhramari:{title:"Bhramari",desc:"Bee breath from the yogic tradition. A full nasal inhale is followed by a slow exhale accompanied by a steady humming sound. The vibration stimulates the vagus nerve, quiets mental activity, and draws the senses inward.",img:"Gemini_Generated_Image_bhramari.png"},
  kapalabhati:{title:"Kapalabhati",desc:"Skull-shining breath: a rapid rhythmic pumping of the abdomen drives forceful nasal exhales while the inhale remains entirely passive. Energising and heat-generating, it is traditionally used as a cleansing kriya before seated practice.",img:"Gemini_Generated_Image_kapalabhati.png"},
  coherent:{title:"Coherent Breathing",desc:"Breathing at precisely 5–6 cycles per minute with equal inhale and exhale durations. This rhythm maximises heart rate variability and synchronises cardiovascular, respiratory, and nervous system oscillations — the strongest known pattern for vagal tone.",img:"coherent.png"},
  tactical:{title:"Tactical Breathing",desc:"A four-phase pattern used by military and emergency personnel: inhale 4, hold 4, exhale 6, hold 2. The asymmetric exhale-dominant rhythm is designed to restore clear cognitive function within seconds of acute stress onset.",img:"tactical.png"},
  sigh:{title:"Physiological Sigh",desc:"A nasal sniff tops up the lungs after the first inhale, then a long slow exhale fully deflates them. Identified by Stanford neuroscience as the single most efficient breath pattern for rapidly reducing physiological arousal.",img:"sigh.png"},
  bhastrika:{title:"Bhastrika",desc:"Bellows breath: both inhale and exhale are rapid, forceful, and equal in duration. Unlike Kapalabhati, the inhale is fully active. Strongly stimulating — raises oxygen saturation, generates internal heat, and clears the respiratory tract.",img:"bhastrika.png"},
  ujjayi:{title:"Ujjayi",desc:"Ocean breath: the throat is lightly constricted on both inhale and exhale to produce a soft, audible sound. The technique slows the breath, generates internal heat, and creates an auditory focal point that anchors attention during practice or movement.",img:"ujjayi.png"},
  sitali:{title:"Sitali",desc:"Cooling breath: inhale slowly through a rolled tongue or lightly parted teeth, then exhale through the nose. The incoming air is cooled and humidified before entering the lungs. Used in Ayurvedic practice to reduce body heat and calm the nervous system.",img:"sitali.png"}
};
const defaultConfigs={
  wimhof:{wimTotalRounds:1,rounds:30,inhale:1.8,exhale:1.8,hold:90,recover:15},

// ── DRAG TO REORDER ───────────────────────────────────────────────
let dragState=null;

function initDragHandles(){
  document.querySelectorAll('.slot-drag-handle').forEach(handle=>{
    handle.addEventListener('pointerdown',onDragStart,{passive:false});
  });
}

function onDragStart(e){
  if(sessionQueue.length<2)return;
  e.preventDefault();
  const slot=e.currentTarget.closest('.queue-slot');
  const idx=parseInt(slot.dataset.index);
  const rect=slot.getBoundingClientRect();

  // Floating ghost
  const ghost=slot.cloneNode(true);
  ghost.id='drag-ghost';
  ghost.style.cssText=`position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;`+
    `pointer-events:none;z-index:999;transition:none;`;
  document.body.appendChild(ghost);

  slot.classList.add('is-dragging');

  dragState={idx,ghost,slotEl:slot,offsetY:e.clientY-rect.top,dropIdx:idx};

  document.addEventListener('pointermove',onDragMove,{passive:false});
  document.addEventListener('pointerup',onDragEnd);
  e.currentTarget.setPointerCapture(e.pointerId);
}

function onDragMove(e){
  if(!dragState)return;
  e.preventDefault();
  dragState.ghost.style.top=(e.clientY-dragState.offsetY)+'px';

  // Clear indicators
  const allSlots=[...document.querySelectorAll('.queue-slot[data-index]')];
  allSlots.forEach(s=>s.classList.remove('drop-above','drop-below'));

  // Find drop target from slots that are not the dragged one
  const others=allSlots.filter(s=>s!==dragState.slotEl);
  if(!others.length){dragState.dropIdx=dragState.idx;return;}

  // Find closest by midpoint
  let best=null,bestDist=Infinity;
  others.forEach(s=>{
    const r=s.getBoundingClientRect(),mid=r.top+r.height/2;
    const d=Math.abs(e.clientY-mid);
    if(d<bestDist){bestDist=d;best=s;}
  });

  if(best){
    const r=best.getBoundingClientRect();
    const si=parseInt(best.dataset.index);
    const inTopHalf=e.clientY<r.top+r.height/2;
    best.classList.add(inTopHalf?'drop-above':'drop-below');
    // Raw insertion point (before removing dragged item)
    let rawDrop=inTopHalf?si:si+1;
    // Adjust: after we splice out idx, positions above it shift down
    let finalDrop=rawDrop>dragState.idx?rawDrop-1:rawDrop;
    finalDrop=Math.max(0,Math.min(sessionQueue.length-1,finalDrop));
    dragState.dropIdx=finalDrop;
  }
}

function onDragEnd(){
  if(!dragState)return;
  document.removeEventListener('pointermove',onDragMove);
  document.removeEventListener('pointerup',onDragEnd);

  dragState.ghost.remove();
  document.querySelectorAll('.queue-slot[data-index]').forEach(s=>{
    s.classList.remove('is-dragging','drop-above','drop-below');
  });

  const{idx,dropIdx}=dragState;
  dragState=null;

  if(dropIdx!==idx){
    const item=sessionQueue.splice(idx,1)[0];
    sessionQueue.splice(dropIdx,0,item);
    renderSessionQueue();
  }
}

function ensureAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume();}
function playChime(){
  ensureAudio();
  const o1=audioCtx.createOscillator(),o2=audioCtx.createOscillator(),g=audioCtx.createGain();
  o1.type='sine';o1.frequency.setValueAtTime(432,audioCtx.currentTime);o2.type='sine';o2.frequency.setValueAtTime(436,audioCtx.currentTime);
  g.gain.setValueAtTime(0,audioCtx.currentTime);g.gain.linearRampToValueAtTime(0.6,audioCtx.currentTime+0.05);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+3);
  o1.connect(g);o2.connect(g);g.connect(audioCtx.destination);o1.start();o2.start();o1.stop(audioCtx.currentTime+3);o2.stop(audioCtx.currentTime+3);
}

function launchMode(){

  } else {

    const cs=window.getComputedStyle(els.halo);
    const curScale=getHaloScale();

    const curColor=cs.borderColor;
    els.halo.style.animation='none';
    void els.halo.offsetWidth;
    els.halo.style.transform=`scale(${curScale.toFixed(3)})`;
    els.halo.style.borderWidth=`${curBW.toFixed(1)}px`;
    if(curColor)els.halo.style.borderColor=curColor;
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      els.halo.style.transition='transform 0.5s cubic-bezier(0.25,1,0.5,1),border-color 0.4s ease,border-width 0.4s ease,opacity 0.3s ease';

    if(activeMode==='wimhof')startWimHof();
    else if(activeMode==='box')startBoxBreathing();
    else if(activeMode==='belly')startBellyBreathing();
    else if(activeMode==='nadi')startNadiBreathing();

    else if(activeMode==='horse')startHorseStance();
    else if(activeMode==='meditation')startMeditation();
    else if(activeMode==='bhramari')startBhramari();
    else if(activeMode==='kapalabhati')startKapalabhati();
    else if(activeMode==='coherent')startCoherent();
    else if(activeMode==='tactical')startTactical();

function skipStep(){
  if(state.phase===PHASE_REST){
    if(state.interval){clearInterval(state.interval);state.interval=null;}
    launchNextFromRest();
    return;
  }
  const cp=state.phase;
  if(state.interval){clearInterval(state.interval);state.interval=null;}
  if(state.textTimeout){clearTimeout(state.textTimeout);state.textTimeout=null;}
  if(state.phaseTimeout){clearTimeout(state.phaseTimeout);state.phaseTimeout=null;}
  els.halo.style.animation='none';
  els.boxPath.style.animation='none';
  els.halo.removeEventListener('animationiteration',wimHofIteration);
  els.halo.removeEventListener('animationiteration',bellyIteration);
  els.halo.removeEventListener('animationiteration',nadiIteration);
  els.halo.removeEventListener('animationiteration',horseIteration);
  els.halo.removeEventListener('animationiteration',bhramariIteration);
  els.topWatermark.classList.remove('active');

  if(activeMode==='wimhof'){
    if(cp===PHASE_WIM_BREATHING){playChime();startRetentionPhase();}
    else if(cp===PHASE_WIM_RETENTION){playChime();els.btnExtend.classList.remove('visible');startRecoveryPhase();}
    else if(cp===PHASE_WIM_RECOVERY){
      playChime();
      if(state.wimCurrentRound<config.wimTotalRounds){state.wimCurrentRound++;startWimHof();}else finishRound();
    }
  } else {
    finishRound();
  }
}

function generateKeyframes(inhale,exhale){const t=inhale+exhale,ip=(inhale/t)*100;els.styleSheet.innerText=`@keyframes breatheCycle{0%{transform:scale(1);border-width:20px;}${ip}%{transform:scale(1.8);border-width:10px;}100%{transform:scale(1);border-width:20px;}}`;}

function startRetentionPhase(){
  state.phase=PHASE_WIM_RETENTION;state.timerVal=config.hold;state.maxTimerVal=config.hold;
  if(state.textTimeout)clearTimeout(state.textTimeout);
  els.halo.style.animation='none';void els.halo.offsetWidth;
  setText(els.topLabel,"HOLD BREATH","var(--text-muted)");setText(els.txtSub,"Retention");
  els.halo.style.transition="transform 2.0s cubic-bezier(0.25,1,0.5,1),border-color 1s ease";
  requestAnimationFrame(()=>{els.halo.style.transform="scale(0.85)";els.halo.style.borderColor="var(--halo-hold)";els.halo.style.borderWidth="20px";});
  setTimeout(()=>{if(state.phase===PHASE_WIM_RETENTION)els.halo.style.animation="heartbeat 1.5s ease-in-out infinite";},2000);
  setText(els.txtMain,formatTime(state.timerVal),"");els.btnExtend.classList.add('visible');
  startInterval(()=>{
    const p=1-(state.timerVal/state.maxTimerVal);
    const dk=document.body.classList.contains('dark');
    // start: accent blue per mode; end: visible muted tone (not near-black in dark)
    const [sR,sG,sB]=dk?[77,138,255]:[52,116,240];
    const [eR,eG,eB]=dk?[90,108,140]:[42,42,42];
    setText(els.txtMain,formatTime(state.timerVal),`rgb(${Math.floor(sR+(eR-sR)*p)},${Math.floor(sG+(eG-sG)*p)},${Math.floor(sB+(eB-sB)*p)})`);
    els.halo.style.borderColor=`rgb(${Math.floor(94+(211-94)*p)},${Math.floor(107+(47-107)*p)},${Math.floor(124+(47-124)*p)})`;
    if(--state.timerVal<0){clearInterval(state.interval);state.interval=null;playChime();els.btnExtend.classList.remove('visible');startRecoveryPhase();}
  },1000);
}
function extendTimer(e){e.stopPropagation();state.timerVal+=15;state.maxTimerVal+=15;setText(els.txtMain,formatTime(state.timerVal));}

// ── WIM HOF RECOVERY ─────────────────────────────────────────────
function startRecoveryPhase(){
  state.phase=PHASE_WIM_RECOVERY;
  els.btnExtend.classList.remove('visible');

  // Expand halo — initial colour adapts to mode
  const recDark=document.body.classList.contains('dark');
  // start RGB: near-black in light, visible mid-blue-grey in dark
  const [rcSR,rcSG,rcSB]=recDark?[123,143,168]:[26,28,40];
  // end RGB: accent blue per mode
  const [rcER,rcEG,rcEB]=recDark?[77,138,255]:[52,116,240];

  els.halo.style.animation='none';
  void els.halo.offsetWidth;
  els.halo.style.transition='transform 0.9s cubic-bezier(0.25,1,0.5,1),border-width 0.9s ease,border-color 0.4s ease,box-shadow 0.4s ease';
  els.halo.style.transform='scale(1.75)';
  els.halo.style.borderWidth='12px';
  els.halo.style.borderColor=`rgb(${rcSR},${rcSG},${rcSB})`;
  els.halo.style.boxShadow=`0 8px 28px rgba(${rcSR},${rcSG},${rcSB},0.3)`;

  // Hand scale pulse to CSS; color stays under JS control
  setTimeout(()=>{
    if(state.phase!==PHASE_WIM_RECOVERY)return;
    els.halo.style.transition='border-color 0.8s ease,box-shadow 0.8s ease';
    els.halo.style.animation='recoveryHeartbeat 1.6s ease-in-out infinite';
  },950);

  setText(els.topLabel,'INHALE & HOLD','var(--accent-blue)');
  setText(els.txtSub,'Recovery');

  const total=config.recover;
  let rTimer=total;

  function applyColor(elapsed){
    const p=Math.min(1,elapsed/total);
    const r=Math.round(rcSR+(rcER-rcSR)*p);
    const g=Math.round(rcSG+(rcEG-rcSG)*p);
    const b=Math.round(rcSB+(rcEB-rcSB)*p);
    const alpha=(0.3+(0.55-0.3)*p).toFixed(2);
    els.halo.style.borderColor=`rgb(${r},${g},${b})`;
    els.halo.style.boxShadow=`0 ${Math.round(8+(18-8)*p)}px ${Math.round(28+(55-28)*p)}px rgba(${r},${g},${b},${alpha})`;
    setText(els.txtMain,`${Math.max(0,rTimer)}s`,`rgb(${r},${g},${b})`);
  }

  applyColor(0);
  let elapsed=0;
  startInterval(()=>{
    rTimer--;elapsed++;
    applyColor(elapsed);
    if(rTimer<0){
      clearInterval(state.interval);state.interval=null;
      playChime();
      startRecoveryExhale();
    }
  },1000);
}

function startRecoveryExhale(){
  if(state.phase!==PHASE_WIM_RECOVERY)return;
  const exhaleTime=config.exhale||2;

  setText(els.topLabel,'EXHALE','var(--text-muted)');
  setText(els.txtSub,'');
  setText(els.txtMain,'','');

  // Shrink halo back to resting scale over exhale duration
  els.halo.style.animation='none';
  void els.halo.offsetWidth;
  els.halo.style.transition=`transform ${exhaleTime}s cubic-bezier(0.65,0,0.35,1),border-color ${exhaleTime}s ease,border-width ${exhaleTime}s ease,box-shadow ${exhaleTime}s ease`;
  els.halo.style.transform='scale(1)';
  els.halo.style.borderWidth='20px';
  els.halo.style.borderColor='var(--halo-breathing)';
  els.halo.style.boxShadow='0 10px 40px rgba(52,116,240,0.25)';

  state.phaseTimeout=setTimeout(()=>{
    if(state.wimCurrentRound<config.wimTotalRounds){state.wimCurrentRound++;startWimHof();}
    else finishRound();
  },exhaleTime*1000);
}

function runFiveSevenEightCycle(){

// ── HALO TRANSITION UTILITIES ─────────────────────────────────────
function getHaloScale(){
  const m=window.getComputedStyle(els.halo).transform;
  if(!m||m==='none')return 1;
  const v=m.match(/matrix\(([^,]+)/);
  return v?Math.max(0.1,parseFloat(v[1])):1;
}

// Freeze the halo at its current COMPUTED position (captures both transform and
// border-width from the live animation), then smoothly transition to a target state.
function transitionHaloTo({scale=1,borderWidth=20,borderColor='var(--halo-hold)',boxShadow='',duration=0.9,then=null}={}){
  // Read computed values BEFORE stopping animation — these reflect the live rendered state
  const cs=window.getComputedStyle(els.halo);
  const curScale=getHaloScale();
  const curBW=parseFloat(cs.borderWidth)||20;
  const curColor=cs.borderColor; // resolved rgb() value

  // Stop animation — element would otherwise snap to non-animated base values
  els.halo.style.animation='none';
  void els.halo.offsetWidth; // flush

  // Pin the halo at the exact position it was at visually — no snap possible
  els.halo.style.transform=`scale(${curScale.toFixed(3)})`;
  els.halo.style.borderWidth=`${curBW.toFixed(1)}px`;
  if(curColor&&curColor!=='')els.halo.style.borderColor=curColor;

  // Two rAFs: one to let the browser commit the frozen state, one to start the transition
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    els.halo.style.transition=`transform ${duration}s cubic-bezier(0.25,1,0.5,1),border-color ${(duration*0.8).toFixed(2)}s ease,border-width ${(duration*0.7).toFixed(2)}s ease,box-shadow ${(duration*0.6).toFixed(2)}s ease,opacity ${(duration*0.5).toFixed(2)}s ease`;
    els.halo.style.transform=`scale(${scale})`;
    els.halo.style.borderWidth=`${borderWidth}px`;
    els.halo.style.borderColor=borderColor;
    els.halo.style.boxShadow=boxShadow;
    els.halo.style.opacity='1';
    if(then)setTimeout(then,duration*1000+50);
  }));
}

// ── FINISH / STOP ─────────────────────────────────────────────────
function finishRound(){
  const dur=(Date.now()-sessionStartTime)/60000;recordSession(activeMode,Math.max(0.1,dur));

  // Stop all timers and listeners — but handle halo visuals ourselves
  const prevPhase=state.phase;
  state.phase=PHASE_IDLE;
  if(state.interval){clearInterval(state.interval);state.interval=null;}
  if(state.textTimeout){clearTimeout(state.textTimeout);state.textTimeout=null;}
  if(state.phaseTimeout){clearTimeout(state.phaseTimeout);state.phaseTimeout=null;}
  els.halo.removeEventListener('animationiteration',wimHofIteration);
  els.halo.removeEventListener('animationiteration',bellyIteration);
  els.halo.removeEventListener('animationiteration',nadiIteration);
  els.halo.removeEventListener('animationiteration',horseIteration);
  els.halo.removeEventListener('animationiteration',bhramariIteration);
  els.halo.removeEventListener('animationiteration',coherentIteration);
  els.halo.removeEventListener('animationiteration',ujjayiIteration);
  els.halo.removeEventListener('animationiteration',sitaliIteration);
  els.boxPath.style.animation='none';
  els.nadiGraphic.classList.remove('visible','block-left','block-right');
  els.topWatermark.classList.remove('active');

  setText(els.topLabel,'COMPLETE','var(--text-muted)');
  setText(els.txtMain,'Done','');setText(els.txtSub,'');

  if(isSessionMode){
    sessionQueueIndex++;
    if(sessionQueueIndex<sessionQueue.length){
      // Smooth transition into rest — halo flows to scale(1) hold colour
      transitionHaloTo({scale:1,borderWidth:20,borderColor:'var(--halo-hold)',duration:0.8,then:startRestTimer});
    } else {
      transitionHaloTo({scale:1,borderWidth:20,borderColor:'var(--halo-hold)',duration:0.8});
      isSessionMode=false;updateSeqIndicator(false);
      setTimeout(endSession,2000);
    }
  } else {
    transitionHaloTo({scale:1,borderWidth:20,borderColor:'var(--halo-hold)',duration:0.8});
    setTimeout(endSession,2000);
  }
}

function startRestTimer(){
  state.phase=PHASE_REST;
  const nextTitle=intros[sessionQueue[sessionQueueIndex].mode].title;
  const REST_DURATION=10;
  let t=REST_DURATION;

  // Halo arrived at scale(1) via transitionHaloTo. restPulse also starts at scale(1),
  // so the animation takes over with zero jump.
  els.halo.style.transition='none';
  void els.halo.offsetWidth;
  els.halo.style.animation='restPulse 3.5s ease-in-out infinite';

  setText(els.topLabel,'REST','var(--text-muted)');
  setText(els.txtSub,`Up next: ${nextTitle}`);
  setText(els.txtMain,`${t}`,'var(--halo-hold)');
  els.topLabel.classList.add('active');
  els.controls.classList.add('active');
  updateSeqIndicator(true);

  state.interval=setInterval(()=>{
    t--;
    setText(els.txtMain,`${Math.max(0,t)}`,'var(--halo-hold)');
    if(t<=0){clearInterval(state.interval);state.interval=null;launchNextFromRest();}
  },1000);
}

function launchNextFromRest(){
  // Freeze halo from the idle pulse, transition toward scale(1) breathing colour,
  // then hand off to runNextInQueue which will call launchMode.
  transitionHaloTo({scale:1,borderWidth:20,borderColor:'var(--halo-breathing)',duration:0.55,then:runNextInQueue});
}

function togglePause(){if(state.paused)resumeSession();else pauseSession();}

function pauseSession(){
  if(state.paused||state.phase===PHASE_IDLE||state.phase===PHASE_REST)return;
  state.paused=true;
  // Freeze CSS animation at its current visual position
  els.halo.style.animationPlayState='paused';
  // Stop all timers — intervalCb is preserved so resume can restart it
  if(state.interval){clearInterval(state.interval);state.interval=null;}
  if(state.textTimeout){clearTimeout(state.textTimeout);state.textTimeout=null;}
  if(state.phaseTimeout){clearTimeout(state.phaseTimeout);state.phaseTimeout=null;}
  setText(els.topLabel,'PAUSED','var(--text-muted)');
  const btn=document.getElementById('btnPause');
  if(btn){btn.innerHTML='&#9654;&#xFE0E;';btn.title='Resume';}
}

function resumeSession(){
  if(!state.paused)return;
  state.paused=false;
  els.halo.style.animationPlayState='running';
  els.topLabel.classList.add('active');
  const btn=document.getElementById('btnPause');
  if(btn){btn.innerHTML='&#9646;&#9646;';btn.title='Pause';}
  const ph=state.phase;
  // Countdown interval techniques: restart with saved callback (closure retains timer value)
  if(state.intervalCb&&(ph===PHASE_WIM_RETENTION||ph===PHASE_WIM_RECOVERY||ph===PHASE_MEDITATION)){
    state.interval=setInterval(state.intervalCb,1000);return;
  }
  // Animation-iteration techniques: animation already resumed, just restart text cue
  if(ph===PHASE_WIM_BREATHING)cycleWimHofText();
  else if(ph===PHASE_ACTIVE){if(activeMode==='belly')cycleBellyText();else if(activeMode==='horse')cycleHorseText();}
  else if(ph===PHASE_NADI)cycleNadiText();
  else if(ph===PHASE_BHRAMARI)cycleBhramariText();
  else if(ph===PHASE_COHERENT)cycleCoherentText();
  else if(ph===PHASE_UJJAYI)cycleUjjayiText();
  else if(ph===PHASE_SITALI)cycleSitaliText();
  // Timeout-chain and pump techniques: restart current cycle (round count preserved)
  else if(ph===PHASE_578)runFiveSevenEightCycle();
  else if(ph===PHASE_TACTICAL)runTacticalCycle();
  else if(ph===PHASE_SIGH)runSighCycle();
  else if(ph===PHASE_KAPAL)runKapalSet();
  else if(ph===PHASE_BHASTRIKA)runBhastrikaSet();
}

function stopAllLogic(){
  state.phase=PHASE_IDLE;state.paused=false;state.intervalCb=null;
  els.halo.style.animationPlayState='running';
  const btn=document.getElementById('btnPause');
  if(btn){btn.innerHTML='&#9646;&#9646;';btn.title='Pause';}
  if(state.interval){clearInterval(state.interval);state.interval=null;}
  if(state.textTimeout){clearTimeout(state.textTimeout);state.textTimeout=null;}
  if(state.phaseTimeout){clearTimeout(state.phaseTimeout);state.phaseTimeout=null;}
  els.halo.style.animation='none';els.boxPath.style.animation='none';
  els.halo.removeEventListener('animationiteration',wimHofIteration);
  els.halo.removeEventListener('animationiteration',bellyIteration);
  els.halo.removeEventListener('animationiteration',nadiIteration);
  els.halo.removeEventListener('animationiteration',horseIteration);
  els.halo.removeEventListener('animationiteration',bhramariIteration);
  els.halo.removeEventListener('animationiteration',coherentIteration);
  els.halo.removeEventListener('animationiteration',ujjayiIteration);
  els.halo.removeEventListener('animationiteration',sitaliIteration);
  els.nadiGraphic.classList.remove('visible','block-left','block-right');els.topWatermark.classList.remove('active');
}
function resetHaloToIdle(){
  setText(els.txtMain,"<sub>2</sub>","");setText(els.txtSub,"FLOW");els.centerHud.style.transform="translateY(0px)";
  els.halo.style.opacity='';els.halo.style.transform='';els.halo.style.borderColor="";els.halo.style.borderWidth="";els.halo.style.boxShadow="";els.halo.style.transition='';
  els.boxPath.classList.remove('active');els.boxPath.style.animation="none";els.boxDot.style.transition="none";els.boxDot.style.top="100%";els.boxDot.style.left="0%";
}
function formatTime(s){if(s<0)return"0:00";const m=Math.floor(s/60),sec=s%60;return`${m}:${sec<10?'0'+sec:sec}`;}
